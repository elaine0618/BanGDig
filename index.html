<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIGTOMORI</title>
    <link rel="stylesheet" href="style.css">
	<!-- 引入文件 -->
	<script src="config.js"></script>
	<script src="utils.js"></script>
	<script src="drawUtils.js"></script>
	<script src="audio.js"></script>
	<script src="blocks.js"></script>
	<script src="ores.js"></script>
	<script src="items.js"></script>
	<script src="bomb.js"></script>
	<script src="shop.js"></script>
	<script src="npc.js"></script>
</head>
<body>
    <canvas id="gameCanvas" width="1200" height="900"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');        
        canvas.style.width = '1200px';
        canvas.style.height = '900px';
        
        // ==================== 游戏状态 在此设置HP能量金币初始值 ====================
        const state = {
			gamePhase: 'start', // 'start', 'playing', 'gameover'
            oxygen: 100,
            hp: 100,
            totalGold: 0,
            shop: {
                isOpen: false,
                shopX: canvas.width / 2 + 170,
                shopY: 390,
                shopWidth: 240,
                shopHeight: 180,
                scrollOffset: 0,
                maxScroll: 0,
                selectedOre: null,
                selectedItem: null,
                animScale: 0,
                animTarget: 0,
                animSpeed: 0.1,
                shopItems: Object.keys(ITEMS).map(id => ({
                    id: id,
                    name: ITEMS[id].name,
                    price: ITEMS[id].price,
                    icon: images[ITEMS[id].icon]
                }))
            },
            decor: {
                x: 0,
                y: 0,
                width: 1200,
                height: 900,
                image: images.decor01
            },
            player: {
                headX: 0,
                headY: 0,
                bodyX: 0,
                bodyY: 0,
                vy: 0,
                grounded: false,
                depth: 0
            },
            inventory: (() => {
                const inv = {};
                for (let type in ORES) {
                    inv[ORES[type].key] = ORES[type].count;
                }
                return inv;
            })(),
            items: (() => {
                const its = {};
                for (let id in ITEMS) {
                    its[id] = ITEMS[id].count;
                }
                return its;
            })(),
            currentItemPage: 0,
            maxItemPage: 0,
            oreNotification: null,
            isFlying: false,
            isDrilling: false,
            drillDirection: null,
            direction: 'up',
            currentHeadImage: images.head1,
            currentBodyImage: images.body,
            currentDrillImage: null,
            animationFrame: 0,
            drillShakeOffset: 0,
            drillShakeDirection: 1,
            playerShakeOffset: 0,
            playerShakeDirection: 1,
            screenShakeOffset: 0,
            screenShakeDirection: 1,
            currentMiningBlock: null,
            miningProgress: 0,
            leftPressed: false,
            rightPressed: false,
            downPressed: false,
            aPressed: false,
            horizonY: 0,
            cameraOffset: 0,
            targetCameraOffset: 0,
            bombActive: null,
            bombExplosions: [],
            notification: {
                visible: false,
                message: '',
                timer: 0,
                type: 'success',
                alpha: 0
            },
            maxVisibleRow: CONFIG.initialVisibleRows - 1
        };
        
        let blocks = [];
        let loadedCount = 0;
        const totalImages = Object.keys(images).length;

		// ==================== 游戏控制 ====================
		function startGame() {
			state.gamePhase = 'playing';
			AudioManager.playOpen();
			AudioManager.startBgm();
			
			// 重置游戏状态
			resetGame();
		}

		function resetGame() {
			// 重置玩家状态
			state.oxygen = 100;
			state.hp = 100;
			state.totalGold = 0;
			state.player.depth = 0;
			state.player.headX = (canvas.width - images.head1.width) / 2;
			state.player.headY = (canvas.height - (images.head1.height + images.body.height)) / 2;
			state.player.bodyY = state.player.headY + images.head1.height;
			state.player.bodyX = state.player.headX + (images.head1.width - images.body.width) / 2;
			state.player.vy = 0;
			state.player.grounded = false;
			state.cameraOffset = 0;
			state.targetCameraOffset = 0;
			
			// 重置道具和物品
			state.items = (() => {
				const its = {};
				for (let id in ITEMS) {
					its[id] = ITEMS[id].count;
				}
				return its;
			})();
			
			state.inventory = (() => {
				const inv = {};
				for (let type in ORES) {
					inv[ORES[type].key] = ORES[type].count;
				}
				return inv;
			})();
			
			// 重新初始化地块
			blocks = initAllBlocks(state, blocks, CONFIG, MAP_LAYOUT, ORE_LAYOUT, BLOCK_TYPES, BLOCK_TYPE_MAP);
			
			// 重置其他状态
			state.bombActive = null;
			state.bombExplosions = [];
			state.currentMiningBlock = null;
			state.miningProgress = 0;
			state.currentItemPage = 0;
			state.maxItemPage = 0;
			NPCManager.reset();
		}

		function gameOver() {
			state.gamePhase = 'gameover';
			AudioManager.stopBgm();
		}

		function restartGame() {
			state.gamePhase = 'start';
			resetGame();
		}

        // ==================== 初始化 ====================
		function init() {
			state.horizonY = canvas.height / 2 + CONFIG.horizonOffset;
			state.canvasHeight = canvas.height;
			NPCManager.init();
			for (let img in images) {
				images[img].onload = () => {
					loadedCount++;
					if (loadedCount === totalImages) {
						blocks = initAllBlocks(state, blocks, CONFIG, MAP_LAYOUT, ORE_LAYOUT, BLOCK_TYPES, BLOCK_TYPE_MAP);
						initPlayerPosition();
						requestAnimationFrame(gameLoop);
					}
				};
			}
		}

        function initPlayerPosition() {
            const totalHeight = images.head1.height + images.body.height;
            const headY = (canvas.height - totalHeight) / 2;
            
            state.player.headX = (canvas.width - images.head1.width) / 2;
            state.player.headY = headY;
            state.player.bodyY = headY + images.head1.height;
            state.player.bodyX = state.player.headX + (images.head1.width - images.body.width) / 2;
            state.player.vy = 0;
            state.player.grounded = false;
            state.player.depth = 0;
            
            state.cameraOffset = 0;
            state.targetCameraOffset = 0;
            state.maxVisibleRow = CONFIG.initialVisibleRows - 1;
        }

		// ==================== 能量生命值系统 ====================
		function updateOxygenAndHp() {
			if (state.gamePhase !== 'playing') return;
			
			if (state.player.depth === 0) {
				state.oxygen = OXYGEN_CONFIG.surfaceValue;
				return;
			}
			
			let consumeRate = OXYGEN_CONFIG.consumeRates[0][1];
			
			for (let i = OXYGEN_CONFIG.consumeRates.length - 1; i >= 0; i--) {
				const [depthThreshold, rate] = OXYGEN_CONFIG.consumeRates[i];
				if (state.player.depth >= depthThreshold) {
					consumeRate = rate;
					break;
				}
			}
			
			state.oxygen = Math.max(0, state.oxygen - consumeRate);
			
			if (state.oxygen === 0) {
				if (!state.hpDamageTimer) {
					state.hpDamageTimer = 0;
				}
				state.hpDamageTimer++;
				
				if (state.hpDamageTimer >= 60) {
					state.hp = Math.max(0, state.hp - OXYGEN_CONFIG.iteminti.consumeWhenOxygenZero);
					state.hpDamageTimer = 0;
					
					if (state.hp <= 0) {
						gameOver();
					}
				}
			} else {
				state.hpDamageTimer = 0;
			}
		}

        // ==================== 更新循环 ====================
        function update() {
			if (state.gamePhase === 'gameover') return;
			if (state.gamePhase === 'start') return;
			NPCManager.update();
			
            state.maxItemPage = Math.max(0, Math.ceil(state.shop.shopItems.length / 8) - 1);
            
            // 商店距离检测
            if (state.shop.isOpen) {
                const playerCenterX = state.player.bodyX + state.currentBodyImage.width / 2;
                const playerCenterY = state.player.bodyY + state.currentBodyImage.height / 2;
                
                const shopCenterX = state.shop.shopX + state.shop.shopWidth / 2;
                const shopCenterY = state.shop.shopY + state.shop.shopHeight / 2;
                
                const distanceX = Math.abs(playerCenterX - shopCenterX);
                const distanceY = Math.abs(playerCenterY - shopCenterY);
                
                if (distanceX > 100 || distanceY > 100) {
                    state.shop.isOpen = false;
                    state.shop.animTarget = 0;
                }
            }
            
            // 更新商店缩放动画
            if (state.shop.animScale < state.shop.animTarget) {
                state.shop.animScale = Math.min(state.shop.animScale + state.shop.animSpeed, state.shop.animTarget);
            } else if (state.shop.animScale > state.shop.animTarget) {
                state.shop.animScale = Math.max(state.shop.animScale - state.shop.animSpeed, state.shop.animTarget);
            }
            
            updateDrillShake();

            if (!state.isDrilling) {
                if (state.leftPressed && !state.rightPressed) {
                    moveLeft();
                } else if (state.rightPressed && !state.leftPressed) {
                    moveRight();
                }
            }

            applyPhysics();
            applyVerticalCollision();
            applyBoundaryLimits();

            updateDepth();
            updateCamera();
            updateAnimation();
            
            checkOreCollection();
            updateBomb();
            updateExplosions();
            updateNotification();
            updateOxygenAndHp();
            updateOreNotification();
            
            if (state.isDrilling && state.player.grounded) {
                performMining();
            }
            
            checkAndStartDrilling();
        }

        // ==================== 绘制画面 ====================
        function draw() {
            ctx.save();
            
			if (state.gamePhase === 'start') {
				drawGameStart();
				ctx.restore();
				return;
			}
			
            if (state.isDrilling && state.player.grounded) {
                ctx.translate(0, state.screenShakeOffset);
            }
            
            ctx.drawImage(images.bg, 0, 0, canvas.width, canvas.height);

            drawBlocks(blocks, ctx, images, state, CONFIG);
            drawOres();
            drawBomb();
            drawExplosions();

            // 商店
            const shopScreenY = state.shop.shopY - state.cameraOffset;
            ctx.drawImage(images.shop, state.shop.shopX, shopScreenY, state.shop.shopWidth, state.shop.shopHeight);

            if (checkShopProximity() && !state.shop.isOpen) {
                ctx.font = 'bold 16px "幼圆", "黑体", monospace';
                ctx.textAlign = 'center';
                
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                ctx.strokeText('[ F ] 进入', state.shop.shopX + 70, shopScreenY - 10);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillText('[ F ] 进入', state.shop.shopX + 70, shopScreenY - 10);
                
                ctx.textAlign = 'left';
            }
            
            // 绘制装饰物
            const decorScreenY = state.decor.y - state.cameraOffset;
            ctx.drawImage(state.decor.image, state.decor.x, decorScreenY, state.decor.width, state.decor.height);

            if (state.isFlying) {
                ctx.drawImage(images.fire, state.player.headX, state.player.headY - state.cameraOffset);
            }

            if (state.isDrilling && state.player.grounded) {
                ctx.save();
                ctx.translate(0, state.playerShakeOffset);
                ctx.drawImage(state.currentBodyImage, state.player.bodyX, state.player.bodyY - state.cameraOffset);
                ctx.drawImage(state.currentHeadImage, state.player.headX, state.player.headY - state.cameraOffset);
                ctx.restore();
            } else {
                ctx.drawImage(state.currentBodyImage, state.player.bodyX, state.player.bodyY - state.cameraOffset);
                ctx.drawImage(state.currentHeadImage, state.player.headX, state.player.headY - state.cameraOffset);
            }
            
            if (state.isDrilling && state.player.grounded && state.currentDrillImage) {
                let drillX, drillY;
                const drillImage = state.currentDrillImage;
                
                if (state.drillDirection === 'down') {
                    drillX = state.player.bodyX + (state.currentBodyImage.width - drillImage.width) / 2;
                    drillY = state.player.bodyY + state.currentBodyImage.height - 10 - CONFIG.downDrillOffset + state.drillShakeOffset - state.cameraOffset;
                } else if (state.drillDirection === 'left') {
                    drillX = state.player.bodyX - drillImage.width + 10 + state.drillShakeOffset;
                    drillY = state.player.bodyY + (state.currentBodyImage.height - drillImage.height) / 2 - CONFIG.sideDrillOffset - state.cameraOffset;
                } else if (state.drillDirection === 'right') {
                    drillX = state.player.bodyX + state.currentBodyImage.width - 10 + state.drillShakeOffset;
                    drillY = state.player.bodyY + (state.currentBodyImage.height - drillImage.height) / 2 - CONFIG.sideDrillOffset - state.cameraOffset;
                }
                
                if (drillX !== undefined && drillY !== undefined) {
                    ctx.drawImage(drillImage, drillX, drillY);
                }
            }
			NPCManager.draw(ctx, state.cameraOffset);
            // 显示深度、金币
            ctx.font = 'bold 24px "幼圆", "黑体", monospace';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`地下深度 ${state.player.depth} 米`, 20, 40);
            ctx.fillText(`金币持有 ${state.totalGold} G`, 20, 80);

			 // 显示进度条
			const gameIconSize = 50;
			const gameIconX = 20;
			const game1IconY = 100;
			const game2IconY = 150;
			const barWidth = 200;
			const barHeight = 20;

			drawOxygenBar(gameIconX, game1IconY, gameIconSize, state.oxygen, barWidth, barHeight);
			drawHealthBar(gameIconX, game2IconY, gameIconSize, state.hp, barWidth, barHeight);
			
			 // 绘制道具栏
			const startX = 480;
			const startY = 10;
			const cellSize = 40;
			const cols = 8;
			const padding = 3;

			drawItemBar(
				startX, startY, cellSize, cols, padding,
				state.currentItemPage, state.maxItemPage,
				state.shop.shopItems, state.items
			);
            
            drawShop();
            drawNotification();
            drawOreNotification();
            
			// 游戏结束
			if (state.gamePhase === 'gameover') {
				drawGameOver();
			}
						
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

		// ==================== 键盘事件 ====================
		window.addEventListener('keydown', (e) => {
			e.preventDefault();
			
			if (state.gamePhase === 'start') {
				startGame();
				return;
			}
			
			if (state.gamePhase === 'gameover') {
				return;
			}
			
			// 空格键 - 交互
			if (e.key === ' ') {
				// 先检查是否有NPC对话框打开
				if (NPCManager.handleSpace()) {
					return;
				}
				
				// 如果没有对话框，检查是否可以与NPC交互
				const playerCenterX = state.player.bodyX + state.currentBodyImage.width / 2;
				const playerCenterY = state.player.bodyY + state.currentBodyImage.height / 2;
				const nearbyNPC = NPCManager.checkInteraction(playerCenterX, playerCenterY);
				
				if (nearbyNPC) {
					nearbyNPC.startTalking();
					NPCManager.interactionCooldown = 30;
				}
				return;
			}
			
			// 上下键 - 对话框导航
			if (e.key === 'ArrowUp') {
				if (NPCManager.handleDialogNavigation('up')) {
					return;
				}
			}
			
			if (e.key === 'ArrowDown') {
				if (NPCManager.handleDialogNavigation('down')) {
					return;
				}
			}
			
			// 数字键 1-8 使用当前页对应格子的道具
			if (e.key >= '1' && e.key <= '8') {
				const slotIndex = parseInt(e.key) - 1;
				const itemIndex = state.currentItemPage * 8 + slotIndex;
				
				if (itemIndex < state.shop.shopItems.length) {
					const item = state.shop.shopItems[itemIndex];
					
					if (item.id === 'bomb') {
						useBomb();
					} else if (item.id === 'h_coffee') {
						useHCoffee();
					} else if (item.id === 'e_nlp') {
						useENlp();
					} else if (item.id === 'e_cdb') {
						useECdb();
					}
				}
				return;
			}
			
			// 翻页键
			if (e.key === 'q' || e.key === 'Q') {
				prevItemPage();
				return;
			}
			if (e.key === 'e' || e.key === 'E') {
				nextItemPage();
				return;
			}
			
			// 互动键
			if (e.key === 'f' || e.key === 'F') {
				toggleShop();
				return;
			}
			
			// 方向键 - 自动判断是挖掘还是移动（只在没有对话框时）
			if (!NPCManager.npcs.some(npc => npc.dialogVisible)) {
				switch(e.key) {
					case 'ArrowUp': 
						startFlying();
						break;
						
					case 'ArrowDown': 
						if (state.player.grounded) {
							const hasBlockBelow = checkDirectionHasBlock('down');
							if (hasBlockBelow) {
								snapToCurrentBlockCenter();
								startDrilling('down');
							} else {
								startMovingDown();
							}
						} else {
							startMovingDown();
						}
						break;
						
					case 'ArrowLeft': 
						if (state.player.grounded) {
							const hasBlockLeft = checkDirectionHasBlock('left');
							if (hasBlockLeft) {
								startDrilling('left');
							} else {
								startMovingLeft();
							}
						} else {
							startMovingLeft();
						}
						break;
						
					case 'ArrowRight': 
						if (state.player.grounded) {
							const hasBlockRight = checkDirectionHasBlock('right');
							if (hasBlockRight) {
								startDrilling('right');
							} else {
								startMovingRight();
							}
						} else {
							startMovingRight();
						}
						break;
				}
			}
		});
        window.addEventListener('keyup', (e) => {
            e.preventDefault();
            
            if (e.key === 'a' || e.key === 'A') {
                state.aPressed = false;
                if (state.isDrilling) {
                    stopDrilling();
                }
                return;
            }
            
            switch(e.key) {
                case 'ArrowUp': 
                    stopFlying(); 
                    break;
                case 'ArrowDown': 
                    stopMovingDown(); 
                    break;
                case 'ArrowLeft': 
                    stopMovingLeft(); 
                    break;
                case 'ArrowRight': 
                    stopMovingRight(); 
                    break;
            }
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            handleShopScroll(e.deltaY > 0 ? 20 : -20);
        });
        
        canvas.addEventListener('click', (e) => {
			const rect = canvas.getBoundingClientRect();
			const x = e.clientX - rect.left;
			const y = e.clientY - rect.top;
			
			if (state.gamePhase === 'gameover') {
				const btnX = canvas.width / 2 - 150;
				const btnY = canvas.height / 2 + 50;
				if (x >= btnX && x <= btnX + 300 && y >= btnY && y <= btnY + 60) {
					restartGame();
				}
				return;
			}
			
			if (state.gamePhase === 'playing') {
				AudioManager.startBgm();
				handleShopClick(x, y);
			}
        });
        
        init();
        
        // ==================== 禁用右键菜单 ====================
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        // ==================== 鼠标特效 ====================
        document.addEventListener('click', function(e) {
		
            const colors = ['#FFD700', '#f0227d', '#ffffff', '#FFA500', '#FF69B4', '#00FFFF', '#FF4500', '#9370DB', '#32CD32', '#FF1493'];
            const starCount = Math.floor(Math.random() * 3) + 3;
            
            for (let i = 0; i < starCount; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'click-star';
                    
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    star.style.color = randomColor;
                    
                    const size = Math.random() * 15 + 20;
                    star.style.fontSize = size + 'px';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 100 + 20;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;
                    star.style.setProperty('--tx', tx + 'px');
                    star.style.setProperty('--ty', ty + 'px');
                    
                    star.style.left = (e.clientX - size/2) + 'px';
                    star.style.top = (e.clientY - size/2) + 'px';
                    
                    star.textContent = '★';
                    
                    document.body.appendChild(star);
                    
                    setTimeout(() => {
                        star.remove();
                    }, 600);
                }, i * 30);
            }
        });
    </script>
</body>
</html>
